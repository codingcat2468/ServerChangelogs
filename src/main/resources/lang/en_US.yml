plugin_name: "<gradient:#a366ff:#9999ff><b><plugin:name>"
prefix: "<translate:plugin_name><reset><dark_gray> » <reset>"
console:
  startup: "Starting <translate:plugin_name> <gray>v<plugin:version></gray> by <aqua><plugin:authors></aqua>"
  startup_storage: "Initializing <green>\"<arg:0>\"</green> changelog storage..."
  reload: "<aqua>Reloading plugin..."
  shutdown: "<red>Shutting down, bye!"
command:
  onlyplayer: "<prefix><red>This command can only be executed by a player"
  root: |-
    <dark_gray><strikethrough>              <reset> <translate:plugin_name> <gray>v<plugin:version></gray> <dark_gray><strikethrough>              
    <reset><plugin:description>
    Made by <green><plugin:authors></green>
  reload:
    success: "<prefix><green>Reload successful, took <aqua><arg:0>ms</aqua>!"
    error:
      io: "<prefix><red>An unexpected I/O error occurred while trying to reload, check the console for more details!"
      details: "<red>Details for unexpected reload error:"
      invalid: "<prefix><red>Invalid configuration: <yellow><arg:0>"
dialog:
  error: "<red>An unexpected error occurred while trying to process a dialog action:"
  create:
    title: "<gradient:#a366ff:#9999ff><b>Create Changelog"
    subtitle: "This action will <green>create</green> a new changelog entry <aqua>#<arg:0>"
    input:
      contents: "Lines <gray>(newline = separate sub-change)</gray>"
      author: "Author <gray>(optional)</gray>"
    button:
      publish: "<sprite:gui:icon/news> <aqua><b>Publish Changelog"
      cancel: "<sprite:gui:spectator/close> <red><b>Cancel"
    success: "<prefix><sprite:gui:icon/checkmark> <green>Successfully published a new changelog!"
    error:
      content_empty: "<prefix><red>Please specify at least one changelog line"
  changelog:
    title: "<sprite:gui:icon/news> <gradient:#a366ff:#9999ff><b>Server Changelog"
    header: |-
      This menu shows you an overview of <green>what has changed</green> on our server recently!
      New server changes will appear <red>in red</red>.
    empty: "<red>There are no changelogs yet, the server must've just released!"
    entry: |-
      <dark_gray><strikethrough>                            <reset> <gradient:green:red><u>Changelog from <arg:0></u></gradient> <dark_gray><strikethrough>                            
      
      <reset><arg:1>
      
      <reset><gray>Published by <white><arg:2></white></gray>
    entry_unread: |-
      <red><b><strikethrough>                         <reset> <sprite:gui:icon/unseen_notification> <gradient:green:red><u>Changelog from <arg:0></u></gradient> <sprite:gui:icon/unseen_notification> <red><b><strikethrough>                         
      
      <reset><arg:1>
      
      <reset><gray>Published by <white><arg:2></white></gray>
    entry_line: "<gray>- <reset><arg:0>"
    unspecified_author: "<dark_red>Unspecified"
    button:
      close: "<sprite:gui:icon/checkmark> <green>Exit"
    read: "<prefix><sprite:gui:icon/checkmark> <green>Marked <yellow><arg:0></yellow> entries as read!"