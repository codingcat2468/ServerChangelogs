plugin_name: "<gradient:#a366ff:#9999ff><b><plugin:name>"
prefix: "<translate:plugin_name><reset><dark_gray> » <reset>"
console:
  startup: "Starting <translate:plugin_name> <gray>v<plugin:version></gray> by <aqua><plugin:authors></aqua>"
  startup.changelog_storage: "Initializing <green>\"<arg:0>\"</green> changelog storage..."
  reload: "<aqua>Reloading plugin..."
  shutdown: "<red>Shutting down, bye!"
command:
  root: |-
    <dark_gray><strikethrough>              <reset> <translate:plugin_name> <gray>v<plugin:version></gray> <dark_gray><strikethrough>              
    <reset><plugin:description>
    Made by <green><plugin:authors></green>
  reload:
    success: "<prefix><green>Reload successful, took <aqua><arg:0>ms</aqua>!"
    error:
      io: "<prefix><red>An unexpected I/O error occurred while trying to reload, check the console for more details!"
      details: "<red>Details for unexpected reload error:"
      invalid: "<prefix><red>Invalid configuration: <yellow><arg:0>"
dialog:
  create:
    title: "<gradient:#a366ff:#9999ff><b>Create Changelog"
    subtitle: "This action will <green>create</green> a new changelog entry <aqua>#<arg:0>"
    input:
      contents: "Lines <gray>(newline = separate sub-change)</gray>"
      author: "Author <gray>(optional)</gray>"
    button:
      publish: "<sprite:gui:icon/news> <aqua><b>Publish Changelog"
      cancel: "<sprite:gui:spectator/close> <red><b>Cancel"